<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Company Directory</title>
        <link rel="stylesheet" href="./index.css">
        <script src="./index.js" type="module"></script>
    </head>
    <body>
        <header>
            <h1>Our Company</h1>
        </header>

        <!-- Task 1: Add a webpage header here with the text "Our Company", according to design.jpg -->

        <main id="employee-container">
            <!--
                Task 2: Implement the look-and-feel given in design.jpg

                Look at the picture in this directory.
                Use HTML and CSS to get to as close as possible to that design.
                The data will be automatically fed to the page via the JavaScript in this folder.
                You don't have to touch that file.

                There is some "default" styling in index.css.
                Feel free to expand that file with your CSS rules and properties to implement the design.

                The template below represents one "employee card" on the design.
                You can implement your HTML structure within the "employee-card" element.
                The placeholder picture is already there for you.

                Be mindful of spacings, alignment, font and the border.

                You DON'T have to be 100% pixel-perfect, but similar to the picture.
            -->
            <template id="employee-template">
                <div class="employee-card">
                    <img class="employee-pic" src="https://placehold.co/32x32/000000/FFFFFF/png" alt="profile picture">
                    <!--
                        Use the placeholders {{employee-name}} and {{employee-role}} in your HTML.
                        They will be replaced with actual text by the JavaScript logic automatically.
                     -->
                </div>
            </template>
        </main>
    </body>
</html>
